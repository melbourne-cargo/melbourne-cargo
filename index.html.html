<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transport Price Calculator</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    .box { background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
    input { width:100%; margin:5px 0; padding:8px; }
    button { padding:10px; width:100%; background:green; color:white; border:none; }
    h2 { text-align:center; }
  </style>
</head>
<body>

<div class="box">
  <h2>Price Calculator</h2>

  <input id="distance" placeholder="Distance (km)">
  <input id="rate" placeholder="Rate per km">
  <input id="base" placeholder="Base cost">
  <input id="weight" placeholder="Weight (kg)">
  <input id="length" placeholder="Length (cm)">
  <input id="width" placeholder="Width (cm)">
  <input id="height" placeholder="Height (cm)">

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>
</div>

<script>
function calculate() {
  let d = Number(document.getElementById('distance').value);
  let r = Number(document.getElementById('rate').value);
  let b = Number(document.getElementById('base').value);
  let w = Number(document.getElementById('weight').value);
  let l = Number(document.getElementById('length').value);
  let wi = Number(document.getElementById('width').value);
  let h = Number(document.getElementById('height').value);

  let volumetric = (l * wi * h) / 5000;
  let chargeable = Math.max(w, volumetric);

  let total = (d * r) + b + (chargeable * 0.6);

  document.getElementById('result').innerText = "Total Price: $" + total.toFixed(2);
}
</script>

</body>
</html>
